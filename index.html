<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JOHN WICK · CHECK BAN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07050a;
    --panel: rgba(15,12,13,0.68);
    --panel-border: rgba(201,162,39,0.28);
    --red:#b3151f;
    --red-bright:#ff2d3d;
    --gold:#c9a227;
    --gold-light:#eccd6e;
    --green:#34d399;
    --text:#f3eee3;
    --text-dim:#a39b8f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    min-height:100vh;
    font-family:'Oswald', sans-serif;
    color:var(--text);
    background:#07050a;
    overflow-x:hidden;
    position:relative;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

.bg{
position:fixed; inset:0;
background-image:
linear-gradient(180deg, rgba(5,3,5,0.55) 0%, rgba(5,3,5,0.72) 38%, rgba(4,2,4,0.92) 78%, #050304 100%),
url(‘https://files.catbox.moe/691xfg.jpeg’);
background-size:cover;
background-position:center 20%;
filter:saturate(0.85) contrast(1.05);
z-index:0;
}
.vignette{
position:fixed; inset:0; z-index:1; pointer-events:none;
background: radial-gradient(ellipse at 50% 30%, rgba(179,21,31,0.10), transparent 55%),
radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.75), transparent 60%),
radial-gradient(circle at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 100%);
}

main{ position:relative; z-index:2; max-width:480px; margin:0 auto; padding:0 22px 60px; }

.topbar{
display:flex; align-items:center; justify-content:space-between;
padding:22px 22px 8px; max-width:480px; margin:0 auto;
position:relative; z-index:2;
}
.avatar{
width:38px; height:38px; border-radius:50%;
border:1px solid rgba(201,162,39,0.4);
display:flex; align-items:center; justify-content:center;
color:var(–gold); font-size:16px;
background:rgba(20,15,14,0.4);
}
.eyebrow{
font-family:‘Oswald’,sans-serif; font-weight:600; letter-spacing:0.32em;
font-size:12px; color:var(–red-bright); text-transform:uppercase;
display:flex; align-items:center; gap:8px;
}
.eyebrow .dot{ width:6px; height:6px; border-radius:50%; background:var(–red-bright); box-shadow:0 0 8px var(–red-bright); }
.menu-btn{
background:none; border:none; color:var(–text-dim); font-size:20px; line-height:1;
cursor:pointer; padding:6px;
}

.hero{ text-align:center; padding:26px 0 8px; }
.hero h1{
font-family:‘Cinzel’, serif; font-weight:900;
font-size:clamp(34px, 9vw, 50px);
letter-spacing:0.04em;
margin:0; line-height:1.05;
color:var(–red-bright);
text-shadow: 0 0 22px rgba(255,45,61,0.45), 0 0 60px rgba(255,45,61,0.15);
}
.hero h1 span{ display:block; font-size:0.62em; color:#e9e1d2; letter-spacing:0.18em; margin-top:2px; }
.rule{
width:64px; height:2px; margin:16px auto;
background:linear-gradient(90deg, transparent, var(–gold), transparent);
}
.subtitle{
margin:0; color:var(–text-dim); letter-spacing:0.2em; font-size:13px;
text-transform:uppercase; font-weight:400;
}

.medallion-wrap{ display:flex; justify-content:center; margin:30px 0 6px; perspective:900px; }
.medallion{
width:148px; height:148px; border-radius:50%;
position:relative;
display:flex; align-items:center; justify-content:center;
background:
radial-gradient(circle at 35% 30%, rgba(60,30,20,0.9), rgba(8,5,6,0.95) 70%);
border:2px solid var(–gold);
box-shadow:
0 0 0 6px rgba(0,0,0,0.4),
0 0 30px 4px rgba(179,21,31,0.35),
inset 0 0 24px rgba(0,0,0,0.7);
transition: box-shadow 0.6s ease;
}
.medallion.state-active{
box-shadow: 0 0 0 6px rgba(0,0,0,0.4), 0 0 34px 6px rgba(52,211,153,0.45), inset 0 0 24px rgba(0,0,0,0.7);
border-color:#7fe3b8;
}
.medallion.state-banned{
box-shadow: 0 0 0 6px rgba(0,0,0,0.4), 0 0 38px 8px rgba(255,45,61,0.55), inset 0 0 24px rgba(0,0,0,0.7);
border-color:var(–red-bright);
}
.medallion.spinning{ animation: coinspin 1.1s linear infinite; }
@keyframes coinspin{ to{ transform: rotateY(360deg); } }
.medallion-ring{
position:absolute; inset:10px; border-radius:50%;
border:1px dashed rgba(201,162,39,0.45);
}
.medallion-mono{
font-family:‘Cinzel’, serif; font-weight:700; font-size:30px;
letter-spacing:0.05em; color:var(–gold-light);
text-shadow:0 0 12px rgba(236,205,110,0.5);
}

.card{
margin-top:26px;
background:var(–panel);
border:1px solid var(–panel-border);
border-radius:18px;
padding:24px 22px 26px;
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
}
.field-label{
display:block; font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
color:var(–text-dim); margin-bottom:10px; font-weight:500;
}
.input-row{
display:flex; align-items:center; gap:8px;
background:rgba(0,0,0,0.35);
border:1px solid rgba(201,162,39,0.22);
border-radius:10px; padding:13px 14px;
transition:border-color 0.2s ease;
}
.input-row.error{ border-color:var(–red-bright); animation:shake 0.4s ease; }
@keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
.input-row .prefix{ color:var(–gold-light); font-family:‘JetBrains Mono’,monospace; font-weight:600; }
.input-row input{
flex:1; background:none; border:none; outline:none;
color:var(–text); font-family:‘JetBrains Mono’,monospace; font-size:16px; letter-spacing:0.02em;
}
.input-row input::placeholder{ color:#5c564c; }

.verify-btn{
width:100%; margin-top:18px; padding:15px 0;
background:linear-gradient(180deg, #c4222f, #8c0f1b);
border:1px solid rgba(255,255,255,0.08);
border-radius:10px;
color:#f4e9c9; font-family:‘Oswald’,sans-serif; font-weight:600;
letter-spacing:0.28em; font-size:14px; text-transform:uppercase;
cursor:pointer;
box-shadow:0 6px 18px rgba(179,21,31,0.35);
transition:transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease;
}
.verify-btn:hover{ transform:translateY(-1px); box-shadow:0 8px 22px rgba(179,21,31,0.5); }
.verify-btn:active{ transform:translateY(0); }
.verify-btn:disabled{ opacity:0.6; cursor:default; transform:none; }

.result{
margin-top:22px; padding-top:20px;
border-top:1px solid rgba(201,162,39,0.18);
}
.result.hidden{ display:none; }
.result.show{ animation:reveal 0.5s ease; }
@keyframes reveal{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

.badge{
display:inline-flex; align-items:center; gap:8px;
padding:7px 14px; border-radius:999px; font-size:12px; font-weight:600;
letter-spacing:0.18em; text-transform:uppercase;
}
.badge.active{ background:rgba(52,211,153,0.12); border:1px solid rgba(52,211,153,0.45); color:#7fe3b8; }
.badge.banned{ background:rgba(255,45,61,0.12); border:1px solid rgba(255,45,61,0.5); color:#ff8088; }
.badge-dot{ width:7px; height:7px; border-radius:50%; background:currentColor; box-shadow:0 0 8px currentColor; }

.number{
font-family:‘JetBrains Mono’,monospace; font-size:25px; font-weight:600;
margin:14px 0 4px; letter-spacing:0.02em; color:#fff;
}
.status-line{ margin:0 0 18px; color:var(–text-dim); font-size:14.5px; }

.quote-plaque{
background:rgba(0,0,0,0.4);
border-left:2px solid var(–gold);
border-radius:4px;
padding:14px 16px;
}
.quote-text{
margin:0 0 8px; font-family:‘Cinzel’, serif; font-style:italic; font-weight:500;
font-size:15px; line-height:1.55; color:#ece4d3;
}
.quote-author{
margin:0; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(–gold-light);
}

footer{
position:relative; z-index:2; text-align:center; padding:30px 20px 40px;
font-size:11px; letter-spacing:0.16em; color:#6b6459; text-transform:uppercase;
}
footer .brand{ color:var(–red-bright); }
</style>

</head>

      <div class="rule"></div>
      <p class="subtitle">WhatsApp · Ban Checker</p>

  <script>
    const phoneInput = document.getElementById('phone');
    const inputRow = document.getElementById('inputRow');
    const verifyBtn = document.getElementById('verifyBtn');
    const medallion = document.getElementById('medallion');
    const result = document.getElementById('result');
    const badge = document.getElementById('badge');
    const badgeText = document.getElementById('badgeText');
    const resultNumber = document.getElementById('resultNumber');
    const statusLine = document.getElementById('statusLine');
    const quoteText = document.getElementById('quoteText');

    const BANNED_QUOTE = "Le silence est souvent plus dangereux que les menaces.";
    const ACTIVE_QUOTE = "On ne sous-estime jamais un homme qui n'a plus rien à perdre. Ce compte, lui, tient toujours debout.";

    function hashString(str){
      let h = 0;
      for (let i = 0; i < str.length; i++){
        h = (h * 31 + str.charCodeAt(i)) >>> 0;
      }
      return h;
    }

    verifyBtn.addEventListener('click', () => {
      const raw = phoneInput.value.replace(/\s+/g, '').trim();
      if (!raw){
        inputRow.classList.remove('error');
        void inputRow.offsetWidth;
        inputRow.classList.add('error');
        return;
      }
      inputRow.classList.remove('error');

      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Vérification…';
      medallion.classList.add('spinning');
      medallion.classList.remove('state-active', 'state-banned');
      result.classList.add('hidden');
      result.classList.remove('show');

      setTimeout(() => {
        const banned = (hashString(raw) % 2) === 0;

        medallion.classList.remove('spinning');
        medallion.classList.add(banned ? 'state-banned' : 'state-active');

        badge.className = 'badge ' + (banned ? 'banned' : 'active');
        badgeText.textContent = banned ? 'Compte banni / spam' : 'Compte actif';
        resultNumber.textContent = '+' + raw;
        statusLine.textContent = banned
          ? "Ce numéro a été banni ou signalé comme spam sur WhatsApp."
          : "Ce numéro est actif sur WhatsApp.";
        quoteText.textContent = banned ? BANNED_QUOTE : ACTIVE_QUOTE;

        result.classList.remove('hidden');
        result.classList.add('show');

        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Vérifier';
      }, 1300);
    });

    phoneInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifyBtn.click();
    });
  </script>

</body>
</html>
